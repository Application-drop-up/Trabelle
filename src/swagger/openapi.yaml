openapi: 3.0.3
info:
  title: Travellle API
  description: REST API for Travellle travel planning app
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local development server
tags:
  - name: plans
    description: Travel plan operations
  - name: pins
    description: Pin operations on plans
  - name: notes
    description: Note operations on pins
  - name: spots
    description: Spot search operations
paths:
  /pins/{pin_id}/notes:
    post:
      tags:
        - notes
      summary: Add a note to a pin
      operationId: createNote
      parameters:
        - name: pin_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Target pin ID
          example: "660e8400-e29b-41d4-a716-446655440001"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNoteRequest'
      responses:
        '201':
          description: Note added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Pin not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  schemas:
    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: "an error occurred"
    Note:
      type: object
      required:
        - id
        - pin_id
        - content
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          example: "770e8400-e29b-41d4-a716-446655440002"
        pin_id:
          type: string
          format: uuid
          example: "660e8400-e29b-41d4-a716-446655440001"
        content:
          type: string
          example: "Great view from the top!"
        created_at:
          type: string
          format: date-time
          example: "2025-01-01T00:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2025-01-01T00:00:00Z"
    CreateNoteRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          example: "Great view from the top!"
    UpdateNoteRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          example: "Updated note content"
